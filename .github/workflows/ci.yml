---
name: "CI"

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Spec:
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_ci.yml@main"
    secrets: "inherit"

  Acceptance:
    needs: Spec
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_acceptance.yml@main"
    with:
      pre_tasks: |
        - name: "Install wget and curl for Agent installation"
          command: "yum install -y wget curl || apt-get update && apt-get install -y wget curl"
    secrets: "inherit"
