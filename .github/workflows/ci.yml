---
name: "CI"

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Spec:
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_ci.yml@main"
    secrets: "inherit"

  Acceptance:
    needs: Spec
    uses: "puppetlabs/cat-github-actions/.github/workflows/module_acceptance.yml@main"
    with:
      env: |
        EXCLUDE_PLATFORMS=centos-8,rocky-8,almalinux-8
      # Litmus ఏజెంట్‌ను ఇన్‌స్టాల్ చేసేటప్పుడు భారీ గిట్ హిస్టరీ డౌన్‌లోడ్ కాకుండా ఇది ఆపుతుంది
      flags: "--shallow-clone"
    secrets: "inherit"
